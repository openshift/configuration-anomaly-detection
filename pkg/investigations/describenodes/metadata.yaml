name: describenodes
rbac:
  roles:
    - namespace: "kube-node-lease"
      rules:
        - apiGroups: ['coordination.k8s.io']
          resources: ['leases']
          verbs: ['get', 'list']
    - namespace: "openshift-config"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-ingress"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-config-managed"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-service-ca"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-ingress-operator"
      rules:
        - apiGroups: ['operator.openshift.io']
          resources: ['ingresscontrollers']
          verbs: ['get']
  clusterRoleRules:
    - apiGroups: ['']
      resources: ['nodes']
      verbs: ['get', 'list']
    - apiGroups: ['']
      resources: ['pods']
      verbs: ['get', 'list']
    - apiGroups: ['']
      resources: ['events']
      verbs: ['get', 'list']
    - apiGroups: ['config.openshift.io']
      resources: ['apiservers', 'ingresses', 'clusteroperators']
      verbs: ['get', 'list']
customerDataAccess: true
