name: MachineHealthCheckUnterminatedShortCircuitSRE
rbac:
  roles:
    - namespace: "openshift-machine-api"
      rules:
        - verbs:
            - "get"
            - "list"
          apiGroups:
            - "machine.openshift.io"
          resources:
            - "machines"
            - "machinehealthchecks"
    - namespace: "openshift-config"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-ingress"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-config-managed"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-service-ca"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-ingress-operator"
      rules:
        - apiGroups: ['operator.openshift.io']
          resources: ['ingresscontrollers']
          verbs: ['get']
  clusterRoleRules:
    - verbs:
        - "get"
        - "list"
      apiGroups:
        - ""
      resources:
        - "nodes"
    - apiGroups: ['config.openshift.io']
      resources: ['apiservers', 'ingresses', 'clusteroperators']
      verbs: ['get', 'list']
customerDataAccess: false
