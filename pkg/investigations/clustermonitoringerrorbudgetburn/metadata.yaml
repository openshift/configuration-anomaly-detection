  roles:
    - namespace: "openshift-config"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-ingress"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-config-managed"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-service-ca"
      rules:
        - apiGroups: ['']
          resources: ['secrets']
          verbs: ['get', 'list']
    - namespace: "openshift-ingress-operator"
      rules:
        - apiGroups: ['operator.openshift.io']
          resources: ['ingresscontrollers']
          verbs: ['get']
  clusterRoleRules:
    - verbs:
        - "get"
        - "list"
      apiGroups:
        - "config.openshift.io"
      resources:
